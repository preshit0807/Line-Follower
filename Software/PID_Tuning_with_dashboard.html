<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>line-follower-sensor-dashboard</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
<style>
:root, [data-theme="light"] {
  --color-bg:#f7f6f2;
  --color-surface:#f9f8f5;
  --color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;
  --color-divider:#dcd9d5;
  --color-border:#d4d1ca;
  --color-text:#28251d;
  --color-text-muted:#7a7974;
  --color-text-faint:#bab9b4;
  --color-text-inverse:#f9f8f4;
  --color-primary:#01696f;
  --color-primary-hover:#0c4e54;
  --color-primary-active:#0f3638;
  --color-primary-highlight:#cedcd8;
  --color-success:#437a22;
  --color-error:#a12c7b;
  --radius-sm:.375rem;
  --radius-md:.5rem;
  --radius-lg:.75rem;
  --radius-xl:1rem;
  --radius-full:9999px;
  --transition-interactive:180ms cubic-bezier(.16,1,.3,1);
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80 / .06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80 / .08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80 / .12);
  --space-1:.25rem;
  --space-2:.5rem;
  --space-3:.75rem;
  --space-4:1rem;
  --space-5:1.25rem;
  --space-6:1.5rem;
  --space-8:2rem;
  --space-10:2.5rem;
  --space-12:3rem;
  --space-16:4rem;
  --space-20:5rem;
  --space-24:6rem;
  --space-32:8rem;
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
  --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --content-narrow:640px;
  --content-default:960px;
  --content-wide:1200px;
  --font-body:'Satoshi','Inter',sans-serif;
  --font-display:'Satoshi','Inter',sans-serif;
}
[data-theme="dark"] {
  --color-bg:#171614;
  --color-surface:#1c1b19;
  --color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;
  --color-divider:#262523;
  --color-border:#393836;
  --color-text:#cdccca;
  --color-text-muted:#797876;
  --color-text-faint:#5a5957;
  --color-text-inverse:#2b2a28;
  --color-primary:#4f98a3;
  --color-primary-hover:#227f8b;
  --color-primary-active:#1a626b;
  --color-primary-highlight:#313b3b;
  --color-success:#6daa45;
  --color-error:#d163a7;
  --shadow-sm:0 1px 2px oklch(0 0 0 / .2);
  --shadow-md:0 4px 12px oklch(0 0 0 / .3);
  --shadow-lg:0 12px 32px oklch(0 0 0 / .4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:none;text-size-adjust:none;scroll-behavior:smooth}
body{
  min-height:100dvh;
  font-family:var(--font-body);
  font-size:var(--text-base);
  line-height:1.6;
  color:var(--color-text);
  background:linear-gradient(180deg,#121212,#0f0f0f);
}
img,svg,canvas{display:block;max-width:100%;height:auto}
button,input,select,textarea{font:inherit;color:inherit}
a{color:inherit}
.skip{position:absolute;left:-999px;top:0}
.skip:focus{left:var(--space-4);top:var(--space-4);background:var(--color-surface);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);z-index:20}
.page{display:grid;grid-template-columns:320px 1fr;min-height:100vh}
.sidebar{padding:var(--space-8);border-right:1px solid var(--color-divider);background:var(--color-surface);position:sticky;top:0;height:100vh;overflow:auto}
.main{padding:var(--space-6);overflow:auto}
.brand{display:flex;gap:var(--space-4);align-items:center;margin-bottom:var(--space-8)}
.logo{width:48px;height:48px;border-radius:16px;background:var(--color-primary);color:var(--color-text-inverse);display:grid;place-items:center;font-weight:700;box-shadow:var(--shadow-md)}
.title h1{font-size:var(--text-xl);line-height:1.05;margin-bottom:var(--space-2)}
.title p{color:var(--color-text-muted);max-width:24ch}
.card{background:var(--color-surface-2);border:1px solid color-mix(in oklch,var(--color-text) 10%, transparent);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);padding:var(--space-5)}
.stack{display:grid;gap:var(--space-4)}
.controls button,.controls input,.controls select,.controls textarea{
  width:100%;
  padding:var(--space-4) var(--space-4);
  border-radius:var(--radius-lg);
  border:1px solid var(--color-border);
  background:var(--color-surface);
  outline:none
}
.btn{cursor:pointer;transition:all var(--transition-interactive)}
.btn:hover{border-color:var(--color-primary)}
.btn-primary{background:var(--color-primary);border-color:var(--color-primary);color:var(--color-text-inverse)}
.btn-primary:hover{background:var(--color-primary-hover)}
.btn-ghost{background:transparent}
.row{display:flex;gap:var(--space-3);align-items:center;flex-wrap:wrap}
.badge{
  display:inline-flex;align-items:center;gap:var(--space-2);
  padding:var(--space-2) var(--space-3);
  border-radius:var(--radius-full);
  background:color-mix(in oklch,var(--color-primary) 10%, var(--color-surface));
  color:var(--color-primary);
  font-size:var(--text-xs);
  font-weight:700
}
.grid-top{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4);margin-bottom:var(--space-4)}
.stat .k{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.12em;color:var(--color-text-muted)}
.stat .v{font-size:var(--text-xl);font-weight:700;margin-top:var(--space-2)}
.content-grid{display:grid;grid-template-columns:1.35fr .95fr;gap:var(--space-4)}
.section{padding:var(--space-5)}
.section h2{font-size:var(--text-lg);margin-bottom:var(--space-4)}
.topline{display:flex;justify-content:space-between;gap:var(--space-4);color:var(--color-text-muted);font-size:var(--text-sm)}
.chart{height:300px;border-radius:var(--radius-lg);background:var(--color-surface);border:1px solid var(--color-divider);overflow:hidden}
.barwrap{display:grid;grid-template-columns:repeat(8,1fr);gap:var(--space-3);align-items:end;height:260px;padding:var(--space-4)}
.sbar{display:flex;flex-direction:column;align-items:center;gap:var(--space-2)}
.sbar .val{font-size:var(--text-sm);font-weight:700}
.sbar .bar{width:100%;height:18px;border-radius:999px;background:var(--color-surface-offset);overflow:hidden;border:1px solid var(--color-divider)}
.sbar .bar > div{height:100%;width:40%;border-radius:999px}
.s1{background:#6fb4c3}.s2{background:#7fa7d7}.s3{background:#dca34b}.s4{background:#8ab561}.s5{background:#a78bc9}.s6{background:#c97f90}.s7{background:#c4ca61}.s8{background:#cfcfcf}
.split2{display:grid;grid-template-columns:1.25fr .75fr;gap:var(--space-4);margin-top:var(--space-4)}
.dashboard{display:grid;grid-template-columns:repeat(8,1fr);gap:var(--space-3);margin-top:var(--space-4)}
.sens{background:var(--color-surface);border:1px solid var(--color-divider);border-radius:var(--radius-lg);padding:var(--space-3);text-align:center}
.sens .tag{font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.1em}
.sens .num{font-size:var(--text-lg);font-weight:700;margin-top:var(--space-2)}
textarea{min-height:110px;resize:vertical;line-height:1.35}
#log{min-height:140px;white-space:pre-wrap;background:var(--color-surface);color:var(--color-success);font-family:ui-monospace,monospace}
.theme-toggle{width:auto;display:inline-flex;align-items:center;gap:var(--space-2)}
@media (max-width:1100px){.page{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.grid-top,.content-grid,.split2{grid-template-columns:1fr}.dashboard{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<a class="skip" href="#main">Skip to content</a>
<div class="page">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">≋</div>
      <div class="title">
        <h1>Sensor Dashboard</h1>
        <p>Wi‑Fi live graphs for all 8 QTR channels.</p>
      </div>
    </div>
    <div class="card stack controls">
      <div class="row" style="justify-content:space-between;">
        <div class="badge" id="connState">● Idle</div>
        <button class="btn btn-ghost theme-toggle" data-theme-toggle type="button" aria-label="Switch theme">◐</button>
      </div>
      <input id="ip" placeholder="ESP32 IP address" value="192.168.4.1">
      <button class="btn btn-primary" onclick="connectWiFi()">Connect source</button>
      <button class="btn" onclick="sendCmd('start')">Start demo stream</button>
      <button class="btn" onclick="sendCmd('stop')">Stop stream</button>
      <div class="badge" id="transportBadge">Wi‑Fi / HTTP</div>
      <label class="label">Max points on graph</label>
      <input id="maxPoints" type="number" value="250" min="50" max="1000">
      <label class="label">Sample input format</label>
      <textarea id="sampleInput">IR:120,340,820,150,1600,910,430,140
IR:130,350,840,1490,1900,930,410,145</textarea>
      <button class="btn" onclick="parsePastedData()">Parse pasted data</button>
      <button class="btn" onclick="clearAll()">Clear charts</button>
    </div>
    <div class="card stack" style="margin-top:var(--space-4)">
      <div class="badge">PID tuning</div>
      <label class="label">Kp</label><input id="kp" type="number" step="0.01" value="0.40">
      <label class="label">Ki</label><input id="ki" type="number" step="0.01" value="0.00">
      <label class="label">Kd</label><input id="kd" type="number" step="0.01" value="1.00">
      <label class="label">Base speed</label><input id="base" type="number" step="1" value="60">
      <label class="label">Turning speed</label><input id="turn" type="number" step="1" value="180">
      <label class="label">Max speed</label><input id="maxs" type="number" step="1" value="180">
      <button class="btn btn-primary" onclick="sendPID()">Apply PID</button>
    </div>
  </aside>
  <main class="main" id="main">
    <div class="grid-top">
      <div class="card stat"><div class="k">Samples</div><div class="v" id="samples">0</div></div>
      <div class="card stat"><div class="k">Peak Sensor</div><div class="v" id="peakSensor">--</div></div>
      <div class="card stat"><div class="k">Peak Value</div><div class="v" id="peakValue">0</div></div>
      <div class="card stat"><div class="k">Estimated Line</div><div class="v" id="linePos">-</div></div>
    </div>
    <div class="content-grid">
      <div class="card section">
        <h2>Live sensor traces</h2>
        <div class="topline"><div></div><div id="timeText">Wi‑Fi • ready</div></div>
        <div class="chart"><svg id="chartSvg" viewBox="0 0 1000 300" width="100%" height="100%" preserveAspectRatio="none"></svg></div>
      </div>
      <div class="card section">
        <h2>Current sensor bars</h2>
        <div class="barwrap" id="barWrap"></div>
      </div>
    </div>
    <div class="split2">
      <div class="card section" style="min-height:320px;">
        <h2>Heatmap view</h2>
        <div class="chart" style="height:230px;display:block;padding:16px;"><canvas id="heatmap" width="760" height="180" style="width:100%;height:180px;border-radius:14px;background:var(--color-surface)"></canvas></div>
      </div>
      <div class="card section" style="min-height:320px;">
        <h2>Latest packet</h2>
        <textarea id="latestPacket" readonly>IR:0,0,0,0,0,0,0,0</textarea>
        <div class="label">Bot state</div>
        <div class="card" style="padding:var(--space-4);background:var(--color-surface);border-radius:var(--radius-lg);" id="botState">Idle</div>
      </div>
    </div>
    <div class="card section" style="margin-top:var(--space-4);min-height:180px;">
      <h2>Log</h2><div id="log">Ready.</div>
    </div>
  </main>
</div>
<script>
let apiBase='http://192.168.4.1';
let data=[];
const colors=['#6fb4c3','#7fa7d7','#dca34b','#8ab561','#a78bc9','#c97f90','#c4ca61','#cfcfcf'];
const barWrap=document.getElementById('barWrap');
for(let i=0;i<8;i++){const d=document.createElement('div');d.className='sbar';d.innerHTML=`<div class="val" id="bv${i}">0</div><div class="bar"><div id="bb${i}" class="s${i+1}"></div></div><div>S${i+1}</div>`;barWrap.appendChild(d)}
const root=document.documentElement;let theme=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';root.setAttribute('data-theme',theme);document.querySelector('[data-theme-toggle]').addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';root.setAttribute('data-theme',theme)});
function log(t){const e=document.getElementById('log');e.textContent+='\n'+t;e.scrollTop=e.scrollHeight}
function setConn(text,ok=false){const el=document.getElementById('connState');el.textContent='● '+text;el.style.color=ok?'var(--color-primary)':'var(--color-error)'}
function setState(text){document.getElementById('botState').textContent=text}
async function connectWiFi(){apiBase='http://'+document.getElementById('ip').value.trim();setConn('Connecting...');try{const r=await fetch(apiBase+'/status');const j=await r.json();setConn('Connected',true);setState(j.state||'Idle');log('Connected to '+apiBase)}catch(e){setConn('Connect failed');log('Connect failed: '+e)} }
async function sendCmd(cmd){try{const r=await fetch(apiBase+'/cmd?value='+encodeURIComponent(cmd));const t=await r.text();log('> '+cmd+' | '+t)}catch(e){log('Send failed: '+e)}}
async function sendPID(){await sendCmd('Kp='+kp.value);await sendCmd('Ki='+ki.value);await sendCmd('Kd='+kd.value);await sendCmd('base='+base.value);await sendCmd('turn='+turn.value);await sendCmd('max='+maxs.value)}
function parseNumbers(line){const m=line.match(/IR:([0-9,]+)(?:\s+POS:([\-0-9]+))?/);if(!m) return null;return {vals:m[1].split(',').map(v=>parseInt(v||'0',10)), pos:m[2]!==undefined?parseInt(m[2],10):null}}
function updateVisuals(vals,pos,raw){const maxPts=Math.max(50,parseInt(maxPoints.value||'250',10));data.push(vals);if(data.length>maxPts)data.shift();samples.textContent=data.length;let pk=0,pkIdx=0;vals.forEach((v,i)=>{if(v>pk){pk=v;pkIdx=i}document.getElementById('bv'+i).textContent=v;document.getElementById('bb'+i).style.width=Math.max(5,v/10)+'%'});peakValue.textContent=pk;peakSensor.textContent='S'+(pkIdx+1);linePos.textContent=pos===null||pos<0?'-':pos;latestPacket.value=raw;drawChart();drawHeatmap()}
function parsePastedData(){sampleInput.value.split(/\n+/).map(s=>s.trim()).filter(Boolean).forEach(line=>{const p=parseNumbers(line);if(p) updateVisuals(p.vals,p.pos,line)});log('Parsed pasted data.')} function clearAll(){data=[];samples.textContent='0';peakSensor.textContent='--';peakValue.textContent='0';linePos.textContent='-';latestPacket.value='';drawChart();drawHeatmap();log('Cleared.')}
function drawChart(){const svg=document.getElementById('chartSvg');svg.innerHTML='';if(!data.length)return;const w=1000,h=300,gx=data.length>1?w/(data.length-1):w;colors.forEach((c,i)=>{let pts='';data.forEach((row,idx)=>{pts+=`${idx*gx},${h-(row[i]/1000)*h} `});const pl=document.createElementNS('http://www.w3.org/2000/svg','polyline');pl.setAttribute('fill','none');pl.setAttribute('stroke',c);pl.setAttribute('stroke-width','2.5');pl.setAttribute('points',pts.trim());svg.appendChild(pl)})}
function drawHeatmap(){const canvas=document.getElementById('heatmap'),ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);const cols=Math.max(1,data.length),cw=canvas.width/cols,ch=canvas.height/8;data.slice(-cols).forEach((row,x)=>row.forEach((v,y)=>{const t=Math.max(0,Math.min(1,v/1000));ctx.fillStyle=`rgba(${Math.round(255*t)},${Math.round(60+80*(1-t))},${Math.round(40+30*(1-t))},0.95)`;ctx.fillRect(x*cw,y*ch,cw+1,ch+1)}))}
setInterval(async()=>{try{const r=await fetch(apiBase+'/packet');if(!r.ok)return;const txt=await r.text();if(txt.trim()) {document.getElementById('timeText').textContent='Wi‑Fi • live';const p=parseNumbers(txt);if(p)updateVisuals(p.vals,p.pos,txt);if(txt.includes('STATE:'))setState(txt.split('STATE:')[1].trim());}}catch(e){}},250);
clearAll();
</script>
</body>
</html>
